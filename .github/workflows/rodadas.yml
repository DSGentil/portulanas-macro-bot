name: Portulanas - Rodadas Programadas

on:
  # ── DISPAROS AUTOMATICOS PAUSADOS ──
  # O panorama/checkpoint estava gerando narrativa de mercado sem
  # nenhum dado real (o modelo "alucinava" o cenario de DXY/treasuries/
  # bolsas, sem ler nenhuma fonte de dado de fato), e o layout das
  # mensagens nao era consistente com o do Garimpo. Pausado em
  # 21/06/2026 a pedido do operador, ate decidir se vale reformular
  # esse workflow com dados reais (e nao so o modelo "chutando"), ou
  # manter apenas o Garimpo como unico workflow de producao.
  # Para reativar um agendamento automatico no futuro, adicionar de
  # volta um bloco assim:
  #
  # schedule:
  #   - cron: "30 11 * * 1-5"
  #   - cron: "0 12-19 * * 1-5"
  #
  workflow_dispatch:
    inputs:
      tipo:
        description: "Tipo de rodada para disparo manual"
        required: true
        default: "checkpoint"
        type: choice
        options:
          - abertura
          - checkpoint

jobs:
  rodada:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Definir tipo de rodada
        id: tipo
        run: |
          HORA_UTC=$(date -u +%H:%M)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tipo=${{ github.event.inputs.tipo }}" >> "$GITHUB_OUTPUT"
          elif [ "$HORA_UTC" = "11:30" ]; then
            echo "tipo=abertura" >> "$GITHUB_OUTPUT"
          else
            echo "tipo=checkpoint" >> "$GITHUB_OUTPUT"
          fi

      - name: Rodar panorama
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python portulanas_panorama.py ${{ steps.tipo.outputs.tipo }}
