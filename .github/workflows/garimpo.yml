name: Portulanas - Garimpo Continuo

on:
  schedule:
    # 8 janelas fixas por dia, dias de semana, em vez de execucao
    # continua. Cada janela = 1 chamada batch ao Gemini, total de 8
    # chamadas/dia - bem dentro da cota de 20/dia da conta atual, com
    # margem para Homologacao e testes manuais. Horarios em UTC
    # (Brasilia = UTC-3, sem horario de verao atualmente):
    #
    #   08:40 BRT (11:40 UTC) - pre-abertura
    #   10:15 BRT (13:15 UTC) - pos-abertura B3 + pos 1a consulta PTAX
    #   12:15 BRT (15:15 UTC) - meio do pregao + pos 3a consulta PTAX
    #   13:45 BRT (16:45 UTC) - pos PTAX final
    #   15:30 BRT (18:30 UTC) - reta final do pregao
    #   17:30 BRT (20:30 UTC) - pos-fechamento
    #   19:00 BRT (22:00 UTC) - janela extra noturna
    #   20:30 BRT (23:30 UTC) - janela extra noturna
    - cron: "40 11 * * 1-5"
    - cron: "15 13 * * 1-5"
    - cron: "15 15 * * 1-5"
    - cron: "45 16 * * 1-5"
    - cron: "30 18 * * 1-5"
    - cron: "30 20 * * 1-5"
    - cron: "0 22 * * 1-5"
    - cron: "30 23 * * 1-5"
  workflow_dispatch: {}   # permite disparar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  garimpo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar garimpo
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PORTULANAS_JANELA_FIXA: "1"
          PORTULANAS_TOP_N: "5"
        run: python portulanas_bot.py

      - name: Salvar cache atualizado
        run: |
          git config --global user.name "portulanas-bot"
          git config --global user.email "bot@portulanas.local"
          git add seen_cache.json
          git diff --staged --quiet || git commit -m "atualiza cache de noticias vistas"
          git push
