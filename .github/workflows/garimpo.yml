name: Portulanas - Garimpo Continuo

on:
  # Agendamento nativo (schedule:) REMOVIDO em 26/06/2026 - o GitHub
  # Actions sofre atraso real de fila (observado: ate ~2h de drift),
  # documentado como limitacao conhecida da plataforma. O disparo das
  # 8 janelas diarias agora vem de fora, via cron-job.org, que chama
  # a API do GitHub (workflow_dispatch) no horario exato. Ver
  # ARQUITETURA.md Seção 10.13.
  #
  # Horarios configurados no cron-job.org (BRT, seg-sex):
  #   08:30 - pre-abertura
  #   10:15 - pos-abertura B3 + pos 1a consulta PTAX
  #   12:15 - meio do pregao + pos 3a consulta PTAX
  #   13:45 - pos PTAX final
  #   15:30 - reta final do pregao
  #   17:30 - pos-fechamento
  #   19:00 - janela extra noturna
  #   20:30 - janela extra noturna
  workflow_dispatch: {}   # permite disparar manualmente pela aba Actions, e e o que o cron-job.org aciona

permissions:
  contents: write

jobs:
  garimpo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar garimpo
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PORTULANAS_JANELA_FIXA: "1"
          PORTULANAS_TOP_N: "5"
        run: python portulanas_bot.py

      - name: Salvar cache atualizado
        run: |
          git config --global user.name "portulanas-bot"
          git config --global user.email "bot@portulanas.local"
          touch seen_cache.json daily_history.json filter_audit_log.json
          git add seen_cache.json daily_history.json filter_audit_log.json
          # retry_needed.json e tratado separado: so existe quando uma
          # falha acabou de ocorrer, e pode ter sido removido pelo
          # proprio script (execucao bem sucedida). git add -A captura
          # tanto criacao quanto remocao, sem falhar se o arquivo nunca
          # existiu no repositorio.
          git add -A -- retry_needed.json 2>/dev/null || true
          git diff --staged --quiet && exit 0
          git commit -m "atualiza cache, historico diario, log de auditoria e flag de retry"
          git pull --rebase origin main
          git push
