name: Portulanas - Garimpo Continuo

on:
  schedule:
    # A cada 30 minutos (ajustado de 15min - cota diaria do Gemini na
    # conta atual e restrita a 20 req/dia, 15min geraria 96 exec/dia,
    # quase 5x acima da cota mesmo com batch processing). GitHub
    # Actions usa horario UTC.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # permite disparar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  garimpo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar garimpo
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python portulanas_bot.py

      - name: Salvar cache atualizado
        run: |
          git config --global user.name "portulanas-bot"
          git config --global user.email "bot@portulanas.local"
          git add seen_cache.json
          git diff --staged --quiet || git commit -m "atualiza cache de noticias vistas"
          git push
