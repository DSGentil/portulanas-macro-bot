name: Portulanas - Garimpo Continuo

on:
  schedule:
    # A cada 15 minutos. GitHub Actions usa horario UTC.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # permite disparar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  garimpo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar garimpo
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python portulanas_bot.py

      - name: Salvar cache atualizado
        run: |
          git config --global user.name "portulanas-bot"
          git config --global user.email "bot@portulanas.local"
          git add seen_cache.json
          git diff --staged --quiet || git commit -m "atualiza cache de noticias vistas"
          git push
