name: Portulanas - Homologacao

on:
  schedule:
    # ── VERSAO TEMPORARIA — valida apenas hoje e amanha ──
    # Todos os dias, de hora em hora, das 8h as 22h BRT.
    # 8h-21h BRT = 11h-00h UTC (mesmo dia) | 22h BRT = 01h UTC (dia seguinte)
    - cron: "0 11-23 * * *"
    - cron: "0 0-1 * * *"
    #
    # ── VERSAO DEFINITIVA — ativar a partir de segunda, removendo as duas
    #    linhas de cron acima e descomentando a linha abaixo ──
    # Segunda a sexta, de hora em hora, das 8h as 19h BRT (11h-22h UTC).
    # - cron: "0 11-22 * * 1-5"
  workflow_dispatch:
    inputs:
      quantidade:
        description: "Quantas noticias forcar analise (amostra)"
        required: false
        default: "3"

permissions:
  contents: read

jobs:
  homologacao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar homologacao
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PORTULANAS_HOMOLOGACAO: "1"
          PORTULANAS_HOMOLOG_SAMPLE: ${{ github.event.inputs.quantidade || '3' }}
        run: python portulanas_bot.py
