name: Portulanas - Homologacao

on:
  # ── DISPAROS AUTOMATICOS SUSPENSOS ──
  # Os testes de homologacao estavam se misturando com os alertas
  # reais no Telegram, entao o agendamento automatico (schedule) foi
  # removido por completo. A homologacao continua disponivel via
  # disparo manual (workflow_dispatch, abaixo) sempre que for
  # necessario auditar o prompt. Para reativar um agendamento
  # automatico no futuro, adicionar de volta um bloco assim:
  #
  # schedule:
  #   - cron: "0 11-22 * * 1-5"
  #
  workflow_dispatch:
    inputs:
      quantidade:
        description: "Quantas noticias forcar analise (amostra)"
        required: false
        default: "3"

permissions:
  contents: read

jobs:
  homologacao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar homologacao
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PORTULANAS_HOMOLOGACAO: "1"
          PORTULANAS_HOMOLOG_SAMPLE: ${{ github.event.inputs.quantidade || '3' }}
        run: python portulanas_bot.py
